 <!-- SECCIÓN 7: REGISTRO DE EVENTOS -->
  <head> <link rel="stylesheet" href="Style.css"></head>
  <script>
fetch('eventos.php')
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById('tabla-eventos');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No hay eventos registrados.</td></tr>';
            return;
        }
        data.forEach(e => {
            tbody.innerHTML += `
                <tr>
                    <td>${e.placa}</td>
                    <td>${e.fecha}</td>
                    <td>${e.hora}</td>
                    <td>${e.movimiento}</td>
                    <td class="${e.clase_css}">${e.estado_label}</td>
                    <td>${e.foto_placa ? '<a href="' + e.foto_placa + '" target="_blank">📷 Ver foto</a>' : '—'}</td>
                    <td>${e.whatsapp_enviado}</td>
                </tr>`;
        });
    });
</script>
        <section id="eventos">
            <h2>Historial de Eventos de Acceso</h2>
            <p>Registro completo de todos los eventos: vehículos autorizados, sin permiso, placas no registradas y autorizaciones manuales de seguridad.</p>
            <table>
                <thead>
                    <tr>
                        <th colspan="7">Historial de Eventos — Universidad Libre Cúcuta</th>
                    </tr>
                    <tr>
                        <th>Placa</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Movimiento</th>
                        <th>Estado</th>
                        <th>Evidencia</th>
                        <th>WhatsApp</th>
                    </tr>
                </thead>
                <body><script src="scriptE.js"></script></body>
    
                   <tbody id="tabla-eventos">
    <!-- cargado dinámicamente -->
</tbody>
                
            </table>
        </section>
        <section id="eventos">
  <div class="panel-card">
    <h3>Video de muestra</h3>
    <p>Mira:</p>

    <div class="video-fijo">
      <iframe
        src="https://www.youtube.com/embed/I_PBBqh2gIw"
        title="Video de muestra"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</section>
