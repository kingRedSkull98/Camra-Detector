     <script>
fetch('vehiculos.php')
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById('tabla-vehiculos');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No hay vehículos registrados.</td></tr>';
            return;
        }
        data.forEach(v => {
            tbody.innerHTML += `
                <tr>
                    <td>${v.placa}</td>
                    <td>${v.nombre ?? v.cedula_usuario}</td>
                    <td>${v.tipo_vehiculo}</td>
                    <td>${v.marca} ${v.linea ?? ''}</td>
                    <td>${v.programa ?? '—'}</td>
                    <td>${v.fecha_fin ?? '—'}</td>
                    <td class="${v.estado}">${v.estado}</td>
                </tr>`;
        });
    });
</script>
     <section id="vehiculos">
            <h2>Vehículos Registrados en el Sistema</h2>
            <p>Tabla de vehículos con permisos activos, pendientes e inhabilitados en el campus.</p>
            <head>
                <link rel="stylesheet" href="style.css">
            </head>
            <table>
                <thead>
                    <tr>
                        <th colspan="7">Registro de Vehículos — Universidad Libre Cúcuta</th>
                    </tr>
                    <tr>
                        <th>Placa</th>
                        <th>Propietario</th>
                        <th>Tipo</th>
                        <th>Marca / Línea</th>
                        <th>Dependencia</th>
                        <th>Vigencia</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                 <tbody id="tabla-vehiculos">
                    
                 </tbody>
                </tbody>
            </table>
        </section>
